name: Argo Bridge Sync Notion

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PARENT_PAGE_ID: ${{ secrets.NOTION_PARENT_PAGE_ID }}
          NOME_UTENTE: ${{ secrets.NOME_UTENTE }}
          PASSWORD: ${{ secrets.PASSWORD }}
          CODICE_SCUOLA: ${{ secrets.CODICE_SCUOLA }}
